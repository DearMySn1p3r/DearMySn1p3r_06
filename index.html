<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio. Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diary-pink': '#FFB6C1', 
                        'diary-pink-light': '#FFE4E1', 
                        'diary-blue': '#AEC6CF', /* 업로드 버튼용 파스텔 블루 */
                        'diary-text': '#4A4A4A', 
                        'ededed': '#ededed', 
                    },
                    fontFamily: {
                        'sans': ['Pretendard', 'sans-serif'],
                        'serif': ['"Lora"', 'serif'], 
                        'myeongjo': ['"Nanum Myeongjo"', 'serif'],
                        'gothic': ['"Nanum Gothic"', 'sans-serif'],
                        'gowun': ['"Gowun Batang"', 'serif'],
                        'hahmlet': ['"Hahmlet"', 'serif'],
                        'pen': ['"Nanum Pen Script"', 'cursive'],
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,500;1,600&family=Gowun+Batang&family=Hahmlet:wght@400;600&family=Nanum+Gothic&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <style>
        body { background-color: #fcfcfc; color: #2a2a2a; font-family: 'Pretendard', sans-serif;
            background-image: linear-gradient(#f1f1f1 1px, transparent 1px), linear-gradient(90deg, #f1f1f1 1px, transparent 1px); background-size: 30px 30px; 
            text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
        .hidden-view { display: none !important; }
        
        /* 캔버스 공통 */
        .canvas-container { width: 100%; aspect-ratio: 1 / 1; position: relative; overflow: hidden; border-radius: 8px; border: 1px solid #ededed; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .canvas-area { width: 800px; height: 800px; position: absolute; top: 0; left: 0; box-sizing: border-box; transform-origin: top left; display: flex; flex-direction: column; overflow: hidden; }

        /* 📖 책갈피 1페이지 레이아웃 */
        .book-canvas-container { width: 100%; aspect-ratio: 1 / 1.5; max-width: 500px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 8px; border: 1px solid #ededed; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .book-canvas { width: 500px; height: 750px; background: #fffcf8; position: absolute; top: 0; left: 0; transform-origin: top left; display: flex; flex-direction: column; box-sizing: border-box; position: relative; }
        .break-all-words { word-break: keep-all; overflow-wrap: break-word; }

        /* 버튼 */
        .btn-minimal { background: #FFB6C1; color: white; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-minimal:hover { background: #FF9AA2; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255, 182, 193, 0.3); }
        .btn-secondary { background: #FFF5F7; color: #FFB6C1; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: all 0.2s; border: 1px solid #FFE4E1; cursor: pointer; }
        .btn-secondary:hover { background: #FFE4E1; color: #FF9AA2; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #FFE4E1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <div id="capture-root" style="position:fixed; left:-9999px; top:0;"></div>

    <header class="bg-white/90 backdrop-blur-md border-b border-ededed sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-5 h-16 flex items-center justify-between">
            <h1 class="font-serif italic font-semibold text-3xl text-diary-pink cursor-pointer select-none drop-shadow-sm transition-transform hover:scale-105" onclick="showView('home')">Studio. Archive</h1>
            <div class="flex gap-2 items-center">
                <button onclick="showView('home')" class="px-3 py-1.5 text-xs font-bold text-gray-500 bg-gray-50 border border-gray-100 rounded-lg hover:bg-gray-100 transition mr-2">Home</button>
                
                <label class="px-3 py-1.5 text-xs font-bold text-white bg-diary-blue rounded-lg hover:bg-[#9eb8c1] transition cursor-pointer shadow-sm">
                    Upload
                    <input type="file" accept=".json" class="hidden" onchange="importAllData(this)">
                </label>
                <button onclick="exportAllData()" class="px-3 py-1.5 text-xs font-bold text-white bg-diary-pink rounded-lg hover:bg-[#ff9aa2] transition shadow-sm">Backup</button>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-5 md:p-10 max-w-7xl mx-auto w-full">
        
        <section id="view-home" class="grid grid-cols-2 lg:grid-cols-4 gap-6">
            <div onclick="showView('snippet')" class="group bg-white rounded-2xl p-6 border border-diary-pink-light shadow-sm hover:shadow-xl hover:border-diary-pink hover:-translate-y-1 transition-all duration-300 cursor-pointer text-center flex flex-col items-center justify-center gap-3">
                <div class="w-12 h-12 bg-diary-pink-light/50 rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform duration-300">📝</div>
                <div><h2 class="text-sm font-bold text-diary-text mb-1 group-hover:text-diary-pink">조각글 발췌</h2></div>
            </div>
            <div onclick="showView('booklog')" class="group bg-white rounded-2xl p-6 border border-diary-pink-light shadow-sm hover:shadow-xl hover:border-diary-pink hover:-translate-y-1 transition-all duration-300 cursor-pointer text-center flex flex-col items-center justify-center gap-3">
                <div class="w-12 h-12 bg-diary-pink-light/50 rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform duration-300">📖</div>
                <div><h2 class="text-sm font-bold text-diary-text mb-1 group-hover:text-diary-pink">책갈피 로그</h2></div>
            </div>
            <div onclick="showView('persona')" class="group bg-white rounded-2xl p-6 border border-diary-pink-light shadow-sm hover:shadow-xl hover:border-diary-pink hover:-translate-y-1 transition-all duration-300 cursor-pointer text-center flex flex-col items-center justify-center gap-3">
                <div class="w-12 h-12 bg-diary-pink-light/50 rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform duration-300">🎭</div>
                <div><h2 class="text-sm font-bold text-diary-text mb-1 group-hover:text-diary-pink">캐릭터 보관함</h2></div>
            </div>
            <div onclick="showView('polaroid')" class="group bg-white rounded-2xl p-6 border border-diary-pink-light shadow-sm hover:shadow-xl hover:border-diary-pink hover:-translate-y-1 transition-all duration-300 cursor-pointer text-center flex flex-col items-center justify-center gap-3">
                <div class="w-12 h-12 bg-diary-pink-light/50 rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform duration-300">📸</div>
                <div><h2 class="text-sm font-bold text-diary-text mb-1 group-hover:text-diary-pink">폴라로이드</h2></div>
            </div>
            
            <div onclick="showView('gallery')" class="group bg-white rounded-2xl p-6 border border-diary-pink-light shadow-sm hover:shadow-xl hover:border-diary-pink hover:-translate-y-1 transition-all duration-300 cursor-pointer text-center flex flex-col items-center justify-center gap-3 md:col-span-2">
                <div class="w-12 h-12 bg-diary-pink-light/50 rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform duration-300">🖼️</div>
                <div><h2 class="text-sm font-bold text-diary-text mb-1 group-hover:text-diary-pink">이미지 갤러리</h2></div>
            </div>
            <div onclick="showView('usernote')" class="group bg-white rounded-2xl p-6 border border-diary-pink-light shadow-sm hover:shadow-xl hover:border-diary-pink hover:-translate-y-1 transition-all duration-300 cursor-pointer text-center flex flex-col items-center justify-center gap-3">
                <div class="w-12 h-12 bg-diary-pink-light/50 rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform duration-300">📓</div>
                <div><h2 class="text-sm font-bold text-diary-text mb-1 group-hover:text-diary-pink">유저 노트</h2></div>
            </div>
            <div onclick="showView('ooc')" class="group bg-white rounded-2xl p-6 border border-diary-pink-light shadow-sm hover:shadow-xl hover:border-diary-pink hover:-translate-y-1 transition-all duration-300 cursor-pointer text-center flex flex-col items-center justify-center gap-3">
                <div class="w-12 h-12 bg-diary-pink-light/50 rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform duration-300">💬</div>
                <div><h2 class="text-sm font-bold text-diary-text mb-1 group-hover:text-diary-pink">OOC 메모</h2></div>
            </div>
        </section>

        <section id="view-snippet" class="hidden-view flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-80 flex-shrink-0 bg-white rounded-2xl p-6 space-y-5 h-fit border border-ededed shadow-sm">
                <h2 class="text-lg font-bold text-diary-pink">Snippet Editor</h2>
                <div>
                    <textarea id="s-input" class="w-full h-28 p-3 bg-gray-50 border border-gray-100 rounded-xl text-sm resize-none focus:outline-none focus:ring-2 focus:ring-diary-pink transition-all" placeholder="발췌 내용을 적어주세요." oninput="updateSnippet()"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 mb-1">제작자 / 유저</label>
                        <input type="text" id="s-creator" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-diary-pink" placeholder="(선택)" oninput="updateSnippet()">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 mb-1">캐릭터명</label>
                        <input type="text" id="s-character" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-diary-pink" placeholder="(선택)" oninput="updateSnippet()">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <select id="s-font" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-diary-pink" onchange="updateSnippet()">
                        <option value="font-sans">본문 고딕</option>
                        <option value="font-gothic">나눔고딕</option>
                        <option value="font-myeongjo">나눔명조</option>
                        <option value="font-gowun">고운바탕</option>
                        <option value="font-hahmlet">함렛</option>
                    </select>
                    <select id="s-align" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-diary-pink" onchange="updateSnippet()">
                        <option value="text-center">가운데 정렬</option>
                        <option value="text-left">왼쪽 정렬</option>
                    </select>
                </div>
                <div class="p-3 bg-gray-50 rounded-xl border border-gray-100">
                    <label class="block text-[11px] font-bold text-diary-pink mb-2">배경 그라데이션</label>
                    <div class="flex gap-2">
                        <input type="color" id="s-color1" value="#ffffff" class="h-8 w-full cursor-pointer rounded border border-gray-200" oninput="updateSnippet()">
                        <span class="text-gray-400 self-center">to</span>
                        <input type="color" id="s-color2" value="#FFE4E1" class="h-8 w-full cursor-pointer rounded border border-gray-200" oninput="updateSnippet()">
                    </div>
                    <label class="block text-[11px] font-bold text-diary-pink mb-1 mt-3">글자색</label>
                    <input type="color" id="s-text-color" value="#4A4A4A" class="h-8 w-full cursor-pointer rounded border border-gray-200" oninput="updateSnippet()">
                </div>
                <button onclick="captureSquare('snippet-canvas', 'Snippet')" class="w-full btn-minimal mt-2">이미지로 저장하기</button>
            </div>

            <div class="flex-1 flex items-center justify-center">
                <div class="canvas-container" id="s-wrapper">
                    <div class="canvas-area p-[80px]" id="snippet-canvas">
                        <div id="s-text-display" class="w-full font-sans text-center leading-[1.8] break-keep flex-1 flex flex-col justify-center" style="font-size: 26px; color: #4A4A4A;">내용이 표시됩니다.</div>
                        <div id="s-sub-display" class="w-full text-center mt-6 text-lg" style="color: #4A4A4A; opacity: 0.8;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-booklog" class="hidden-view space-y-6">
            <div class="bg-white rounded-2xl p-6 border border-ededed shadow-sm flex flex-col gap-5">
                <div class="flex flex-col md:flex-row gap-5">
                    <div class="flex-1 flex flex-col gap-2">
                        <p class="text-xs text-diary-pink font-bold">*문구* <span class="text-gray-400 font-normal">형태로 작성하면 지정한 강조색으로 변합니다.</span></p>
                        <textarea id="b-input" class="w-full h-full min-h-[300px] p-4 bg-gray-50 border border-gray-100 rounded-xl text-xs resize-none focus:outline-none focus:ring-2 focus:ring-diary-pink transition-all" placeholder="여기에 대화 로그를 붙여넣으세요. 에디터가 자동으로 페이지를 넘겨줍니다." oninput="triggerProcessBookLog()"></textarea>
                    </div>
                    
                    <div class="w-full md:w-80 space-y-4">
                        <div class="grid grid-cols-3 gap-2">
                            <div class="col-span-2">
                                <label class="block text-[11px] font-bold text-gray-400 mb-1">책 제목</label>
                                <input type="text" id="b-title" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-diary-pink" placeholder="제목" oninput="renderBookPage()">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 mb-1">제목 색상</label>
                                <input type="color" id="b-title-color" value="#2a2a2a" class="h-8 w-full cursor-pointer rounded border border-gray-100" oninput="renderBookPage()">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 mb-1">제목 글꼴</label>
                                <select id="b-title-font" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-diary-pink" onchange="renderBookPage()">
                                    <option value="font-serif">세리프</option>
                                    <option value="font-sans">고딕</option>
                                    <option value="font-gowun">고운바탕</option>
                                    <option value="font-myeongjo">나눔명조</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 mb-1">본문 글꼴</label>
                                <select id="b-font" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-diary-pink" onchange="triggerProcessBookLog()">
                                    <option value="font-myeongjo">나눔명조</option>
                                    <option value="font-gowun">고운바탕</option>
                                    <option value="font-hahmlet">함렛</option>
                                    <option value="font-sans">고딕</option>
                                </select>
                            </div>
                        </div>

                        <div class="p-3 bg-gray-50 border border-gray-100 rounded-xl space-y-3">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[10px] font-bold text-diary-pink mb-1">상하 여백 (<span id="b-py-val">60</span>px)</label>
                                    <input type="range" id="b-py" min="30" max="120" step="5" value="60" class="w-full accent-diary-pink" oninput="triggerProcessBookLog()">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-diary-pink mb-1">좌우 여백 (<span id="b-px-val">75</span>px)</label>
                                    <input type="range" id="b-px" min="30" max="100" step="5" value="75" class="w-full accent-diary-pink" oninput="triggerProcessBookLog()">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-diary-pink mb-1">줄간격 (<span id="b-lh-val">2.0</span>)</label>
                                    <input type="range" id="b-lh" min="1.5" max="3.0" step="0.1" value="2.0" class="w-full accent-diary-pink" oninput="triggerProcessBookLog()">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-diary-pink mb-1">자간 (<span id="b-ls-val">-0.5</span>px)</label>
                                    <input type="range" id="b-ls" min="-2" max="5" step="0.5" value="-0.5" class="w-full accent-diary-pink" oninput="triggerProcessBookLog()">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[10px] font-bold text-diary-pink mb-1">들여쓰기</label>
                                    <select id="b-indent" class="w-full p-1.5 bg-white border border-gray-100 rounded-lg text-xs focus:outline-none" onchange="triggerProcessBookLog()">
                                        <option value="0">없음</option>
                                        <option value="15px">작게</option>
                                        <option value="25px" selected>보통</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-diary-pink mb-1">강조 색상 (*텍스트*)</label>
                                    <input type="color" id="b-highlight-color" value="#FF82A9" class="h-6 w-full cursor-pointer rounded border border-gray-100" oninput="renderBookPage()">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-between pt-2 border-t border-gray-100">
                    <button onclick="changePage(-1)" class="btn-secondary text-xs" id="btn-prev">이전 장</button>
                    <span class="font-bold text-diary-pink bg-diary-pink-light/30 px-4 py-2 rounded-full text-xs" id="page-indicator">1 / 1</span>
                    <button onclick="changePage(1)" class="btn-secondary text-xs" id="btn-next">다음 장</button>
                </div>
            </div>

            <div class="flex justify-center w-full">
                <div class="book-canvas-container" id="b-wrapper">
                    <div class="book-canvas text-diary-text flex flex-col" id="book-canvas">
                        <div class="absolute inset-0 shadow-[inset_0_0_40px_rgba(0,0,0,0.02)] pointer-events-none"></div>
                        <div class="text-center text-[26px] mb-8 font-bold tracking-widest book-header-main" id="b-header-main"></div>
                        <div class="flex-1 text-[14px] whitespace-pre-wrap break-keep text-justify break-all-words" id="b-page-content"></div>
                        <div id="b-footer" class="absolute flex justify-between items-end w-full" style="box-sizing: border-box;">
                            <span id="b-header-sub" class="text-xs opacity-60 tracking-widest font-bold"></span>
                            <span id="b-num" class="text-xs text-[#a1a1a1]">1</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <button onclick="downloadAllBookPagesMultiple()" class="w-full btn-minimal text-base py-4" id="btn-dl-all">전체 페이지 여러 장의 PNG로 자동 저장하기</button>
        </section>

        <section id="view-persona" class="hidden-view space-y-6">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="w-full lg:w-72 flex-shrink-0 bg-white rounded-2xl p-6 border border-ededed shadow-sm flex flex-col h-[650px]">
                    <h2 class="text-lg font-bold text-diary-pink mb-4 text-center">My Characters</h2>
                    <button onclick="createNewPersona()" class="w-full bg-diary-pink-light/30 text-diary-pink font-bold py-3 rounded-xl mb-4 hover:bg-diary-pink hover:text-white transition-all">+ 새 캐릭터 추가</button>
                    <div id="persona-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
                </div>
                
                <div class="flex-1 bg-white rounded-2xl p-8 border border-ededed shadow-sm flex flex-col md:flex-row gap-6 relative">
                    <div class="w-full md:w-72 space-y-4">
                        <div class="w-full aspect-square bg-gray-50 rounded-2xl overflow-hidden border border-gray-100 relative group">
                            <img id="p-img-display" src="" class="w-full h-full object-cover hidden">
                            <div id="p-img-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-300 text-xs gap-2">
                                <span class="text-2xl">📸</span><span>고화질 이미지 업로드</span>
                            </div>
                            <label class="absolute inset-0 bg-black/40 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer text-sm font-bold backdrop-blur-sm">변경
                                <input type="file" accept="image/*" class="hidden" onchange="handlePersonaUpload(this)">
                            </label>
                        </div>
                        <input type="text" id="p-name" placeholder="캐릭터 이름" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-diary-pink font-bold text-center">
                        <input type="text" id="p-age" placeholder="나이 / 속성" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-diary-pink text-center">
                    </div>
                    <div class="flex-1 space-y-4 flex flex-col">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-1">한 줄 특징 요약</label>
                            <textarea id="p-features" class="w-full h-16 p-3 bg-gray-50 border border-gray-100 rounded-xl text-xs resize-none focus:outline-none focus:ring-2 focus:ring-diary-pink"></textarea>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-1">외형 묘사</label>

    <script>
        window.showView = function(viewId) {
            document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden-view'));
            const target = document.getElementById('view-' + viewId);
            if(target) target.classList.remove('hidden-view');
            
            setTimeout(() => { 
                applyScale('s-wrapper', 'snippet-canvas', 800); 
                applyScale('b-wrapper', 'book-canvas', 500); 
                applyScale('pola-wrapper', 'polamaker-canvas', 500); 
            }, 50);
            
            if(viewId === 'booklog') setTimeout(triggerProcessBookLog, 100);
            if(viewId === 'ooc') loadOOC(); 
            if(viewId === 'persona') loadPersonaList(); 
            if(viewId === 'gallery') loadGallery();
            if(viewId === 'usernote') loadUserNotes();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function applyScale(wrapperId, canvasId, baseWidth) {
            const wrap = document.getElementById(wrapperId); 
            const can = document.getElementById(canvasId);
            if(wrap && can && !wrap.closest('.hidden-view')) { 
                const scale = wrap.getBoundingClientRect().width / baseWidth;
                can.style.transform = `scale(${Math.min(scale, 1)})`; 
            }
        }
        
        window.addEventListener('resize', () => { 
            applyScale('s-wrapper', 'snippet-canvas', 800); 
            applyScale('b-wrapper', 'book-canvas', 500); 
            applyScale('pola-wrapper', 'polamaker-canvas', 500);
        });

        // 🔥 PNG 원본 유지 무손실 압축 🔥
        function compressImage(file, maxWidth = null) {
            return new Promise(resolve => {
                const r = new FileReader();
                r.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const can = document.createElement('canvas');
                        let w = img.width;
                        let h = img.height;

                        if (maxWidth && w > maxWidth) {
                            h = Math.round(h * maxWidth / w);
                            w = maxWidth;
                        }
                        can.width = w;
                        can.height = h;
                        const ctx = can.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(can.toDataURL('image/png'));
                    };
                    img.src = e.target.result;
                };
                r.readAsDataURL(file);
            });
        }

        // 🔥 완벽한 캡처 렌더링 🔥
        window.captureSquare = async function(id, filename) {
            await document.fonts.ready;

            const original = document.getElementById(id);
            const captureRoot = document.getElementById('capture-root');

            const clone = original.cloneNode(true);
            clone.style.transform = 'none';
            clone.style.position = 'static';
            clone.style.width = original.offsetWidth + 'px';
            clone.style.height = original.offsetHeight + 'px';

            captureRoot.innerHTML = '';
            captureRoot.appendChild(clone);

            await new Promise(r => setTimeout(r, 50));

            const canvas = await html2canvas(clone, {
                scale: 4,
                useCORS: true,
                backgroundColor: null
            });

            captureRoot.innerHTML = '';

            const link = document.createElement('a');
            link.download = `${filename}_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        /* ================= 1. 조각글 발췌 ================= */
        window.updateSnippet = function() {
            const can = document.getElementById('snippet-canvas'); 
            const txt = document.getElementById('s-text-display');
            const sub = document.getElementById('s-sub-display');
            
            txt.innerText = document.getElementById('s-input').value || '내용이 표시됩니다.';
            txt.className = `w-full ${document.getElementById('s-font').value} ${document.getElementById('s-align').value} leading-[1.8] break-keep flex-1 flex flex-col justify-center`;
            
            const tColor = document.getElementById('s-text-color').value;
            txt.style.color = tColor; sub.style.color = tColor;
            
            const creator = document.getElementById('s-creator').value;
            const character = document.getElementById('s-character').value;
            if(creator || character) {
                sub.innerHTML = `${creator ? creator : ''} ${creator && character ? ' | ' : ''} <span class="font-bold">${character}</span>`;
            } else { sub.innerHTML = ''; }
            
            const col1 = document.getElementById('s-color1').value;
            const col2 = document.getElementById('s-color2').value;
            can.style.background = `linear-gradient(135deg, ${col1} 0%, ${col2} 100%)`;
        };

        /* ================= 2. 책갈피 로그 ================= */
        let pages = []; let currentIdx = 0;
        let bookLogTimeout;

        window.formatHighlight = function(text) {
            if(!text) return "";
            const hc = document.getElementById('b-highlight-color').value;
            let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            return escaped.replace(/\*(.*?)\*/g, `<span style="color: ${hc}; font-weight: bold;">$1</span>`);
        };

        window.triggerProcessBookLog = function() {
            clearTimeout(bookLogTimeout);
            bookLogTimeout = setTimeout(processBookLog, 300); 
        };

        window.processBookLog = async function() {
            const text = document.getElementById('b-input').value;
            if(!text) { pages = [""]; currentIdx = 0; renderBookPage(); return; }

            const font = document.getElementById('b-font').value;
            const lh = document.getElementById('b-lh').value;
            const ls = document.getElementById('b-ls').value;
            const indent = document.getElementById('b-indent').value;
            const py = parseInt(document.getElementById('b-py').value);
            const px = parseInt(document.getElementById('b-px').value);

            document.getElementById('b-lh-val').innerText = lh;
            document.getElementById('b-ls-val').innerText = ls;
            document.getElementById('b-py-val').innerText = py;
            document.getElementById('b-px-val').innerText = px;

            const exactWidth = 500 - (px * 2);
            const firstPageMaxH = 750 - (py * 2) - 80 - 60; 
            const normalMaxH = 750 - (py * 2) - 80; 

            const measureDiv = document.createElement('div');
            measureDiv.className = `${font} break-all-words`;
            measureDiv.style.width = exactWidth + 'px';
            measureDiv.style.position = 'absolute';
            measureDiv.style.left = '-9999px';
            measureDiv.style.top = '0';
            measureDiv.style.visibility = 'hidden';
            measureDiv.style.lineHeight = lh;
            measureDiv.style.letterSpacing = ls + 'px';
            measureDiv.style.textIndent = indent === '0' ? '0' : indent;
            
            document.body.appendChild(measureDiv);

            pages = [];
            let currentPageText = "";
            let paragraphs = text.split('\n');

            for (let i = 0; i < paragraphs.length; i++) {
                let p = paragraphs[i] + (i < paragraphs.length - 1 ? '\n' : '');
                
                measureDiv.innerText = currentPageText + p;
                let currentMaxH = (pages.length === 0) ? firstPageMaxH : normalMaxH;

                if (measureDiv.clientHeight > currentMaxH) {
                    if (currentPageText !== "") {
                        pages.push(currentPageText.replace(/\n$/, ''));
                        currentPageText = "";
                        currentMaxH = (pages.length === 0) ? firstPageMaxH : normalMaxH;
                    }
                    
                    let chars = Array.from(p);
                    for(let char of chars) {
                        measureDiv.innerText = currentPageText + char;
                        if(measureDiv.clientHeight > currentMaxH && currentPageText !== "") {
                            pages.push(currentPageText);
                            currentPageText = char;
                            currentMaxH = normalMaxH;
                        } else {
                            currentPageText += char;
                        }
                    }
                } else {
                    currentPageText += p;
                }
            }
            if (currentPageText) pages.push(currentPageText.replace(/\n$/, ''));
            if (pages.length === 0) pages.push("");
            
            document.body.removeChild(measureDiv);

            if(currentIdx >= pages.length) currentIdx = pages.length - 1;
            if(currentIdx < 0) currentIdx = 0;

            renderBookPage();
        };
        
        window.renderBookPage = function() {
            const title = document.getElementById('b-title').value; 
            const titleColor = document.getElementById('b-title-color').value;
            const titleFontValue = document.getElementById('b-title-font').value;
            
            const headerMain = document.getElementById('b-header-main');
            const headerSub = document.getElementById('b-header-sub');
            
            if (currentIdx === 0) {
                headerMain.style.display = 'block';
                headerMain.innerText = title;
                headerMain.style.color = titleColor;
                headerMain.className = `text-center text-[24px] mb-8 font-bold tracking-widest book-header-main ${titleFontValue} ${titleFontValue === 'font-serif' ? 'italic' : ''}`;
                headerSub.innerText = '';
            } else {
                headerMain.style.display = 'none';
                headerSub.innerText = title;
                headerSub.style.color = titleColor;
                headerSub.className = `text-xs tracking-widest ${titleFontValue} ${titleFontValue === 'font-serif' ? 'italic' : ''}`;
            }
            
            const font = document.getElementById('b-font').value;
            const lh = document.getElementById('b-lh').value;
            const ls = document.getElementById('b-ls').value;
            const indent = document.getElementById('b-indent').value;
            const py = document.getElementById('b-py').value;
            const px = document.getElementById('b-px').value;

            const pageContent = document.getElementById('b-page-content');
            pageContent.className = `flex-1 ${font} text-[14px] whitespace-pre-wrap break-keep text-justify break-all-words`;
            pageContent.style.lineHeight = lh;
            pageContent.style.letterSpacing = ls + 'px';
            pageContent.style.textIndent = indent === '0' ? '0' : indent;

            const canvas = document.getElementById('book-canvas');
            canvas.style.background = '#fffcf8';
            canvas.style.padding = `${py}px ${px}px`;
            
            const footer = document.getElementById('b-footer');
            footer.style.left = `${px}px`;
            footer.style.width = `calc(100% - ${px * 2}px)`;
            footer.style.bottom = `${parseInt(py)/2}px`;
            
            pageContent.innerHTML = formatHighlight(pages[currentIdx] || ''); 
            document.getElementById('b-num').innerText = currentIdx + 1;
            
            const total = pages.length; 
            document.getElementById('page-indicator').innerText = `${currentIdx + 1} / ${total || 1}`;
            document.getElementById('btn-prev').disabled = currentIdx === 0; document.getElementById('btn-next').disabled = currentIdx >= total - 1;
        };

        window.changePage = function(d) { currentIdx += d; renderBookPage(); };

        /* ================= 3. 캐릭터 보관함 ================= */
        let currentPersonaIndex = -1; let currentPImg = null;
        function getPersonas() { return JSON.parse(localStorage.getItem('studio_personas') || '[]'); }
        
        window.loadPersonaList = function() {
            const list = getPersonas(); const container = document.getElementById('persona-list');
            if(list.length === 0) { container.innerHTML = '<div class="text-center text-xs text-gray-400 mt-10">저장된 캐릭터가 없습니다.</div>'; createNewPersona(); return; }
            container.innerHTML = list.map((p, i) => `
                <div onclick="selectPersona(${i})" class="flex items-center gap-3 p-3 rounded-2xl cursor-pointer transition-colors border ${currentPersonaIndex === i ? 'border-diary-pink bg-diary-pink-light/20' : 'border-transparent hover:bg-gray-50'}">
                    <img src="${p.img || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='}" class="w-12 h-12 rounded-xl object-cover bg-gray-100">
                    <div class="flex-1 overflow-hidden">
                        <h4 class="font-bold text-sm text-diary-text truncate">${p.name || '이름 없음'}</h4>
                        <p class="text-[10px] text-gray-400 truncate">${p.features || '특징 없음'}</p>
                    </div>
                </div>
            `).join('');
            if(currentPersonaIndex === -1 && list.length > 0) selectPersona(0);
        };
        window.createNewPersona = function() {
            currentPersonaIndex = -1; currentPImg = null;
            document.getElementById('p-name').value = ''; document.getElementById('p-age').value = ''; document.getElementById('p-features').value = ''; document.getElementById('p-appearance').value = ''; document.getElementById('p-personality').value = ''; document.getElementById('p-background').value = '';
            document.getElementById('p-img-display').classList.add('hidden'); document.getElementById('p-img-placeholder').classList.remove('hidden');
            document.getElementById('btn-delete-persona').classList.add('hidden');
            document.getElementById('btn-save-persona').innerText = "새 캐릭터 저장";
            loadPersonaList(); 
        };
        window.selectPersona = function(index) {
            currentPersonaIndex = index; const p = getPersonas()[index]; if(!p) return;
            document.getElementById('p-name').value = p.name || ''; document.getElementById('p-age').value = p.age || ''; document.getElementById('p-features').value = p.features || ''; document.getElementById('p-appearance').value = p.app || ''; document.getElementById('p-personality').value = p.per || ''; document.getElementById('p-background').value = p.bg || '';
            currentPImg = p.img;
            const disp = document.getElementById('p-img-display');
            if(currentPImg) { disp.src = currentPImg; disp.classList.remove('hidden'); document.getElementById('p-img-placeholder').classList.add('hidden'); } 
            else { disp.classList.add('hidden'); document.getElementById('p-img-placeholder').classList.remove('hidden'); }
            document.getElementById('btn-delete-persona').classList.remove('hidden');
            document.getElementById('btn-save-persona').innerText = "정보 수정하기";
            loadPersonaList();
        };
        window.handlePersonaUpload = async function(input) {
            if(input.files[0]) { currentPImg = await compressImage(input.files[0], null); document.getElementById('p-img-display').src = currentPImg; document.getElementById('p-img-display').classList.remove('hidden'); document.getElementById('p-img-placeholder').classList.add('hidden'); }
        };
        window.savePersona = function() {
            const p = { name: document.getElementById('p-name').value, age: document.getElementById('p-age').value, features: document.getElementById('p-features').value, app: document.getElementById('p-appearance').value, per: document.getElementById('p-personality').value, bg: document.getElementById('p-background').value, img: currentPImg };
            let list = getPersonas();
            try {
                if(currentPersonaIndex === -1) { list.unshift(p); currentPersonaIndex = 0; } else { list[currentPersonaIndex] = p; }
                localStorage.setItem('studio_personas', JSON.stringify(list)); alert("저장되었습니다."); loadPersonaList();
            } catch (e) { alert("저장 공간이 부족합니다!"); }
        };
        window.deleteCurrentPersona = function() {
            if(currentPersonaIndex === -1) return; if(!confirm("이 캐릭터 정보를 삭제할까요?")) return;
            let list = getPersonas(); list.splice(currentPersonaIndex, 1); localStorage.setItem('studio_personas', JSON.stringify(list)); createNewPersona();
        };

        /* ================= 4. 폴라로이드 메이커 ================= */
        let currentPolaImg = null;
        window.handlePolaMakerUpload = async function(input) {
            if(input.files[0]) {
                currentPolaImg = await compressImage(input.files[0], null);
                const pmImg = document.getElementById('pm-img');
                pmImg.style.backgroundImage = `url(${currentPolaImg})`;
                pmImg.classList.remove('hidden');
                document.getElementById('pm-placeholder').classList.add('hidden');
                updatePolaMaker(); 
            }
        };
        window.updatePolaMaker = function() {
            document.getElementById('pm-display').innerText = document.getElementById('pm-text').value;
            document.getElementById('pm-frame').style.backgroundColor = document.getElementById('pm-bg').value;
            const img = document.getElementById('pm-img');
            if(currentPolaImg) {
                const posX = document.getElementById('pm-pos-x').value;
                const posY = document.getElementById('pm-pos-y').value;
                img.style.backgroundPosition = `${posX}% ${posY}%`;
            }
        };

        /* ================= 5. 이미지 갤러리 ================= */
        let currentGalleryIndex = -1; 
        function getGallery() { return JSON.parse(localStorage.getItem('studio_gallery') || '[]'); }
        window.addGalleryItem = async function() {
            const input = document.getElementById('g-img-upload'); const prompt = document.getElementById('g-prompt').value;
            if(!input.files[0]) return alert("이미지를 첨부해주세요.");
            const base64Img = await compressImage(input.files[0], null); const gallery = getGallery(); gallery.unshift({ img: base64Img, prompt: prompt });
            try { localStorage.setItem('studio_gallery', JSON.stringify(gallery)); input.value = ''; document.getElementById('g-prompt').value = ''; loadGallery(); } 
            catch(e) { alert("용량 부족!"); }
        };
        window.loadGallery = function() {
            const gal = getGallery(); const grid = document.getElementById('gallery-grid');
            grid.innerHTML = gal.map((item, i) => `
                <div onclick="openGalleryModal(${i})" class="bg-white rounded-2xl p-3 flex flex-col gap-2 relative group border border-gray-100 shadow-sm hover:shadow-md hover:border-diary-pink transition-all cursor-pointer">
                    <img src="${item.img}" class="w-full aspect-square object-cover rounded-xl">
                    <p class="text-[10px] text-gray-400 whitespace-pre-wrap px-1 truncate">${item.prompt || '메모 없음'}</p>
                </div>
            `).join('');
        };
        window.openGalleryModal = function(index) {
            currentGalleryIndex = index; const item = getGallery()[index]; if(!item) return;
            document.getElementById('modal-img').src = item.img; document.getElementById('modal-prompt').value = item.prompt || '';
            document.getElementById('gallery-modal').classList.remove('hidden');
        };
        window.closeGalleryModal = function() { document.getElementById('gallery-modal').classList.add('hidden'); currentGalleryIndex = -1; };
        window.saveModalPrompt = function() {
            if(currentGalleryIndex === -1) return; const gal = getGallery(); gal[currentGalleryIndex].prompt = document.getElementById('modal-prompt').value;
            try { localStorage.setItem('studio_gallery', JSON.stringify(gal)); alert("수정되었습니다."); loadGallery(); } catch(e){}
        };
        window.deleteModalItem = function() {
            if(currentGalleryIndex === -1) return; if(!confirm("삭제할까요?")) return;
            const gal = getGallery(); gal.splice(currentGalleryIndex, 1); localStorage.setItem('studio_gallery', JSON.stringify(gal));
            closeGalleryModal(); loadGallery();
        };

        /* ================= 6. 유저 노트 (글만 보관) ================= */
        let currentUserNoteIndex = -1;
        function getUserNotes() { return JSON.parse(localStorage.getItem('studio_usernotes') || '[]'); }
        
        window.addUserNote = function() {
            const title = document.getElementById('un-title').value.trim();
            const content = document.getElementById('un-content').value.trim();
            if(!title && !content) return alert("내용을 입력해주세요.");
            
            const notes = getUserNotes();
            notes.unshift({ title, content, date: new Date().toLocaleDateString() });
            try {
                localStorage.setItem('studio_usernotes', JSON.stringify(notes));
                document.getElementById('un-title').value = '';
                document.getElementById('un-content').value = '';
                loadUserNotes();
            } catch(e) { alert("저장 공간이 부족합니다."); }
        };

        window.loadUserNotes = function() {
            const notes = getUserNotes();
            const grid = document.getElementById('usernote-grid');
            grid.innerHTML = notes.map((note, i) => `
                <div onclick="openUserNoteModal(${i})" class="bg-white rounded-2xl p-5 flex flex-col gap-2 relative group border border-gray-100 shadow-sm hover:shadow-md hover:border-diary-pink transition-all cursor-pointer h-40">
                    <h3 class="font-bold text-sm text-diary-text truncate">${note.title || '제목 없음'}</h3>
                    <p class="text-xs text-gray-500 whitespace-pre-wrap flex-1 overflow-hidden opacity-80" style="display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;">${note.content}</p>
                    <span class="text-[10px] text-gray-300 mt-auto">${note.date || ''}</span>
                </div>
            `).join('');
        };

        window.openUserNoteModal = function(index) {
            currentUserNoteIndex = index;
            const note = getUserNotes()[index];
            if(!note) return;
            
            document.getElementById('modal-un-title').value = note.title || '';
            document.getElementById('modal-un-content').value = note.content || '';
            document.getElementById('usernote-modal').classList.remove('hidden');
        };

        window.closeUserNoteModal = function() {
            document.getElementById('usernote-modal').classList.add('hidden');
            currentUserNoteIndex = -1;
        };

        window.saveUserNoteModal = function() {
            if(currentUserNoteIndex === -1) return;
            const notes = getUserNotes();
            notes[currentUserNoteIndex].title = document.getElementById('modal-un-title').value.trim();
            notes[currentUserNoteIndex].content = document.getElementById('modal-un-content').value.trim();
            
            localStorage.setItem('studio_usernotes', JSON.stringify(notes));
            alert("수정되었습니다.");
            loadUserNotes();
            closeUserNoteModal();
        };

        window.deleteUserNoteModal = function() {
            if(currentUserNoteIndex === -1) return;
            if(!confirm("이 노트를 삭제할까요?")) return;
            
            const notes = getUserNotes();
            notes.splice(currentUserNoteIndex, 1);
            localStorage.setItem('studio_usernotes', JSON.stringify(notes));
            
            closeUserNoteModal();
            loadUserNotes();
        };

        /* ================= 7. OOC 메모장 ================= */
        let editOocIndex = -1;
        function getOOC() { return JSON.parse(localStorage.getItem('studio_ooc') || '[]'); }
        window.loadOOC = function() {
            const list = document.getElementById('ooc-list');
            list.innerHTML = getOOC().map((o, i) => `
                <li class="bg-white border border-gray-100 rounded-2xl flex justify-between items-center p-4 text-sm shadow-sm hover:border-diary-pink transition-colors group">
                    <span class="cursor-pointer text-gray-600 hover:text-diary-pink hover:font-bold transition-all flex-1 pr-4" onclick="navigator.clipboard.writeText('${o.replace(/'/g, "\\'")}')">${o}</span>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editOOC(${i})" class="text-gray-300 hover:text-blue-400 font-bold">수정</button>
                        <button onclick="deleteOOC(${i})" class="text-gray-300 hover:text-red-400 font-bold ml-2">삭제</button>
                    </div>
                </li>
            `).join('');
        };
        window.addOOC = function() { 
            const inEl = document.getElementById('ooc-input'); const val = inEl.value.trim(); if(!val) return; 
            const o = getOOC(); 
            if(editOocIndex > -1) { o[editOocIndex] = val; editOocIndex = -1; document.getElementById('btn-ooc-add').innerText = '추가'; } 
            else { o.unshift(val); }
            localStorage.setItem('studio_ooc', JSON.stringify(o)); inEl.value = ''; loadOOC(); 
        };
        window.editOOC = function(i) {
            document.getElementById('ooc-input').value = getOOC()[i]; editOocIndex = i;
            document.getElementById('btn-ooc-add').innerText = '수정 완료'; document.getElementById('ooc-input').focus();
        };
        window.deleteOOC = function(i) { const o = getOOC(); o.splice(i, 1); localStorage.setItem('studio_ooc', JSON.stringify(o)); loadOOC(); };

        /* ================= 공통 (백업/업로드) ================= */
        window.exportAllData = function() { 
            const data = JSON.stringify(localStorage); 
            const blob = new Blob([data], { type: "application/json" }); 
            const lnk = document.createElement("a"); 
            lnk.href = URL.createObjectURL(blob); 
            lnk.download = `Studio_Backup_${new Date().toISOString().slice(0,10)}.json`; 
            lnk.click(); 
        };
        
        window.importAllData = function(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    for (let key in data) {
                        localStorage.setItem(key, data[key]);
                    }
                    alert("데이터가 성공적으로 복원되었습니다!");
                    location.reload();
                } catch(err) {
                    alert("잘못된 백업 파일입니다.");
                }
            };
            reader.readAsText(input.files[0]);
        };

        window.onload = function() { try { showView('home'); setTimeout(triggerProcessBookLog, 100); } catch(e){} };
    </script>
</body>
</html>
